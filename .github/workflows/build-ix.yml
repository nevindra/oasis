name: Build IX Sandbox Image

on:
  push:
    branches: [master]
    paths:
      - 'internal/ixd/**'
      - 'cmd/ix/**'
      - 'sandbox/**'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [master]
    paths:
      - 'internal/ixd/**'
      - 'cmd/ix/**'
      - 'sandbox/**'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ix

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Test sandbox packages
        run: go test ./internal/ixd/... ./sandbox/... -count=1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (base)
        id: meta-base
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (base)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/ix/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-base.outputs.tags }}
          labels: ${{ steps.meta-base.outputs.labels }}
          cache-from: type=gha,scope=ix-base
          cache-to: type=gha,mode=max,scope=ix-base

      - name: Extract metadata (browser)
        id: meta-browser
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-browser
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (browser)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/ix/Dockerfile.browser
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-browser.outputs.tags }}
          labels: ${{ steps.meta-browser.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=ix-browser
          cache-to: type=gha,mode=max,scope=ix-browser
