name: Build IX Sandbox Image

on:
  push:
    branches: [master]
    paths:
      - 'internal/ixd/**'
      - 'cmd/ix/**'
      - 'sandbox/**'
      - 'renderers/**'
      - 'bin/oasis-render'
      - 'requirements.txt'
      - 'go.mod'
      - 'go.sum'
    tags:
      - 'v*'
  pull_request:
    branches: [master]
    paths:
      - 'internal/ixd/**'
      - 'cmd/ix/**'
      - 'sandbox/**'
      - 'renderers/**'
      - 'bin/oasis-render'
      - 'requirements.txt'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ix

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Test sandbox packages
        run: go test ./internal/ixd/... ./sandbox/... -count=1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/ix/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ix
          cache-to: type=gha,mode=max,scope=ix
